<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Dashboard</title>

<style>
body{
    font-family: Arial;
    background:#f2f6ff;
    text-align:center;
}

h1{
    margin-top:20px;
}

.container{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
}

.card{
    background:white;
    padding:20px;
    width:200px;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.temp{
    font-size:28px;
    font-weight:bold;
}

.emoji{
    font-size:40px;
}

.spinner{
    margin-top:40px;
    font-size:20px;
}

.error{
    color:red;
    font-size:18px;
}
</style>

</head>

<body>

<h1>🌍 Weather Dashboard</h1>

<div id="loading" class="spinner">Loading weather...</div>

<div class="container" id="weatherContainer"></div>

<div id="error" class="error"></div>

<script>

// cities with coordinates
const cities = [
    {name:"Delhi", lat:28.61, lon:77.23},
    {name:"Mumbai", lat:19.07, lon:72.87},
    {name:"Bangalore", lat:12.97, lon:77.59}
];

const container = document.getElementById("weatherContainer");
const loading = document.getElementById("loading");
const errorDiv = document.getElementById("error");

// weather code → emoji
function getWeatherEmoji(code){

    if(code === 0) return "☀️ Clear";
    if(code <= 3) return "⛅ Cloudy";
    if(code <= 48) return "🌫 Fog";
    if(code <= 67) return "🌧 Rain";
    if(code <= 77) return "❄️ Snow";
    if(code <= 99) return "⛈ Storm";

    return "🌍";
}


// fetch weather for one city
function fetchWeather(city){

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true`;

    return fetch(url)
    .then(res => res.json())
    .then(data => ({
        name: city.name,
        temp: data.current_weather.temperature,
        code: data.current_weather.weathercode
    }));
}


// fetch all cities
Promise.all(cities.map(fetchWeather))

.then(results => {

    loading.style.display = "none";

    results.forEach(city => {

        const card = document.createElement("div");
        card.className = "card";

        const weather = getWeatherEmoji(city.code);

        card.innerHTML = `
            <h3>${city.name}</h3>
            <div class="emoji">${weather}</div>
            <div class="temp">${city.temp}°C</div>
        `;

        container.appendChild(card);
    });

})

.catch(err => {

    loading.style.display="none";
    errorDiv.innerText="❌ Failed to load weather data.";

});

</script>

</body>
</html>
